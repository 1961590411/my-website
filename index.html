<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style>
        :root {
            --sidebar-width: 240px;
            --sidebar-collapsed-width: 64px;
            --sidebar-padding-x: 14px;
            --bg-color: #f8fafc;
            --panel-color: #ffffff;
            --sidebar-color: #ffffff;
            --sidebar-text: #334155;
            --accent: #2563eb;
            --sidebar-border: #e2e8f0;
            --hover-bg: #eef2ff;
        }

        body {
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            color: #111827;
        }

        .app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-color);
            color: var(--sidebar-text);
            border-right: 1px solid var(--sidebar-border);
            transition: width 0.25s ease;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-inner {
            padding: 20px var(--sidebar-padding-x);
        }

        .sidebar-top {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .sidebar-title {
            margin: 0;
            font-size: 18px;
            white-space: nowrap;
        }

        .menu {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 8px;
        }

        .menu a {
            color: var(--sidebar-text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            height: 36px;
            box-sizing: border-box;
            justify-content: flex-start;
            padding: 0 10px;
            border-radius: 6px;
            white-space: nowrap;
            transition: background-color 0.15s ease;
        }

        .menu a.active {
            background-color: #dbeafe;
            color: #1d4ed8;
        }

        .menu .icon {
            width: 16px;
            min-width: 16px;
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            line-height: 1;
        }

        .menu a:hover {
            background-color: var(--hover-bg);
        }

        .menu a:active {
            background-color: #cddcff;
        }

        .main {
            flex: 1;
            padding: 24px;
            transition: padding 0.25s ease;
        }

        .toggle-btn {
            border: none;
            background-color: transparent;
            color: var(--accent);
            width: 36px;
            height: 36px;
            min-width: 36px;
            min-height: 36px;
            aspect-ratio: 1 / 1;
            padding: 0;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            font-family: Consolas, "Courier New", monospace;
            font-weight: 700;
            line-height: 1;
            display: inline-flex;
            flex-shrink: 0;
            align-items: center;
            justify-content: center;
        }

        .toggle-btn-text {
            display: inline-block;
            width: 14px;
            text-align: center;
        }

        .toggle-btn:hover {
            background-color: #eaf1ff;
        }

        .toggle-btn:active {
            background-color: #cddcff;
        }

        .card {
            background-color: var(--panel-color);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .weather-search {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        select, button {
            padding: 8px 10px;
            font-size: 14px;
        }

        #weatherResult p {
            margin: 4px 0;
        }

        .app.collapsed .sidebar {
            width: var(--sidebar-collapsed-width);
        }

        .app.collapsed .sidebar-title,
        .app.collapsed .menu a .label {
            opacity: 0;
            pointer-events: none;
        }

        .app.collapsed .menu a .label {
            display: none;
        }

        .app.collapsed .menu a {
            width: 36px;
            height: 36px;
            min-width: 36px;
            min-height: 36px;
            aspect-ratio: 1 / 1;
            padding: 0 10px;
            margin: 0;
            border-radius: 8px;
            align-items: center;
            justify-content: flex-start;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                height: 100vh;
                z-index: 10;
                left: 0;
                top: 0;
            }

            .main {
                padding: 16px;
                margin-left: var(--sidebar-width);
                transition: margin-left 0.25s ease;
            }

            .app.collapsed .main {
                margin-left: var(--sidebar-collapsed-width);
            }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <aside class="sidebar">
            <div class="sidebar-inner">
                <div class="sidebar-top">
                    <button class="toggle-btn" id="toggleBtn" type="button">
                        <span class="toggle-btn-text"></span>
                    </button>
                    <h2 class="sidebar-title">导航菜单</h2>
                </div>
                <ul class="menu">
                    <li><a href="#" class="menu-link active" data-view="home"><span class="icon">⌂</span><span class="label">首页</span></a></li>
                    <li><a href="#" class="menu-link" data-view="about"><span class="icon">i</span><span class="label">关于我</span></a></li>
                    <li><a href="#" class="menu-link" data-view="projects"><span class="icon">□</span><span class="label">项目</span></a></li>
                    <li><a href="#" class="menu-link" data-view="contact"><span class="icon">@</span><span class="label">联系</span></a></li>
                    <li><a href="#" class="menu-link" data-view="weather"><span class="icon">☁</span><span class="label">天气</span></a></li>
                </ul>
            </div>
        </aside>

        <main class="main">
            <div class="card view active" data-view-content="home">
                <h1>首页</h1>
                <p>欢迎来到我的个人网站，这里是首页内容。</p>
            </div>
            <div class="card view" data-view-content="about">
                <h1>关于我</h1>
                <p>这里可以展示个人简介、技能和经历。</p>
            </div>
            <div class="card view" data-view-content="projects">
                <h1>项目</h1>
                <p>这里可以展示项目案例、作品链接和说明。</p>
            </div>
            <div class="card view" data-view-content="contact">
                <h1>联系</h1>
                <p>这里可以放邮箱、社交账号或联系方式。</p>
            </div>
            <div class="card view" data-view-content="weather">
                <h1>天气查询（后端代理）</h1>
                <div class="weather-search">
                    <select id="provinceSelect">
                        <option value="">请选择省份</option>
                    </select>
                    <select id="citySelect" disabled>
                        <option value="">请先选择省份</option>
                    </select>
                    <button id="weatherBtn" type="button">查询天气</button>
                </div>
                <div id="weatherResult"></div>
            </div>
        </main>
    </div>

    <script>
        const app = document.getElementById("app");
        const toggleBtn = document.getElementById("toggleBtn");
        const toggleBtnText = document.querySelector(".toggle-btn-text");
        const menuLinks = document.querySelectorAll(".menu-link");
        const views = document.querySelectorAll(".view");

        const provinceSelect = document.getElementById("provinceSelect");
        const citySelect = document.getElementById("citySelect");
        const weatherBtn = document.getElementById("weatherBtn");
        const resultDiv = document.getElementById("weatherResult");
        const API_BASE = "/api";
        let querying = false;

        function updateToggleArrow() {
            toggleBtnText.textContent = app.classList.contains("collapsed")
                ? ">"
                : "<";
        }

        toggleBtn.addEventListener("click", function () {
            app.classList.toggle("collapsed");
            updateToggleArrow();
        });

        function switchView(targetView) {
            menuLinks.forEach(function (link) {
                link.classList.toggle("active", link.dataset.view === targetView);
            });

            views.forEach(function (view) {
                view.classList.toggle("active", view.dataset.viewContent === targetView);
            });
        }

        menuLinks.forEach(function (link) {
            link.addEventListener("click", function (event) {
                event.preventDefault();
                switchView(link.dataset.view);
            });
        });

        function setCityPlaceholder(text) {
            citySelect.innerHTML = `<option value="">${text}</option>`;
        }

        function createDistrictUrl(keywords) {
            return `${API_BASE}/district?keywords=${encodeURIComponent(keywords)}`;
        }

        async function loadProvinces() {
            resultDiv.innerText = "正在加载省份列表...";
            try {
                const response = await fetch(createDistrictUrl("中国"));
                const data = await response.json();

                if (data.status !== "1" || !data.districts || !data.districts.length) {
                    throw new Error(data.info || "省份列表加载失败");
                }

                const provinces = data.districts[0].districts || [];
                provinceSelect.innerHTML = '<option value="">请选择省份</option>';

                provinces.forEach(function (province) {
                    provinceSelect.insertAdjacentHTML(
                        "beforeend",
                        `<option value="${province.name}">${province.name}</option>`
                    );
                });

                resultDiv.innerText = "请选择省份和城市后查询天气。";
            } catch (error) {
                resultDiv.innerText = `省份列表加载失败：${error.message}`;
            }
        }

        async function loadCities(provinceName) {
            citySelect.disabled = true;
            setCityPlaceholder("城市列表加载中...");

            try {
                const response = await fetch(createDistrictUrl(provinceName));
                const data = await response.json();

                if (data.status !== "1" || !data.districts || !data.districts.length) {
                    throw new Error(data.info || "城市列表加载失败");
                }

                const districts = data.districts[0].districts || [];
                citySelect.innerHTML = '<option value="">请选择城市</option>';

                if (!districts.length) {
                    citySelect.insertAdjacentHTML(
                        "beforeend",
                        `<option value="${data.districts[0].adcode}">${data.districts[0].name}</option>`
                    );
                } else {
                    districts.forEach(function (city) {
                        citySelect.insertAdjacentHTML(
                            "beforeend",
                            `<option value="${city.adcode}">${city.name}</option>`
                        );
                    });
                }

                citySelect.disabled = false;
            } catch (error) {
                setCityPlaceholder("城市列表加载失败");
                resultDiv.innerText = `城市列表加载失败：${error.message}`;
            }
        }

        provinceSelect.addEventListener("change", function () {
            const provinceName = provinceSelect.value;
            if (!provinceName) {
                citySelect.disabled = true;
                setCityPlaceholder("请先选择省份");
                return;
            }
            loadCities(provinceName);
        });

        weatherBtn.addEventListener("click", async function () {
            if (querying) return;

            const selectedProvince = provinceSelect.value;
            const selectedCityCode = citySelect.value;
            const selectedCityName = citySelect.options[citySelect.selectedIndex]?.text || "";

            if (!selectedProvince) {
                alert("请先选择省份！");
                return;
            }

            if (!selectedCityCode) {
                alert("请选择城市后再查询！");
                return;
            }

            querying = true;
            weatherBtn.disabled = true;
            resultDiv.innerText = `正在查询 ${selectedProvince} ${selectedCityName} 的天气...`;

            try {
                const url = `${API_BASE}/weather?city=${encodeURIComponent(selectedCityCode)}`;
                const response = await fetch(url);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "请求失败");
                }

                if (data.status !== "1" || !data.lives || !data.lives.length) {
                    throw new Error(data.info || "天气查询失败");
                }

                const weatherData = data.lives[0];
                resultDiv.innerHTML = `
                    <p>${weatherData.province}</p>
                    <p>${weatherData.city}</p>
                    <p>温度：${weatherData.temperature}℃</p>
                    <p>天气：${weatherData.weather}</p>
                    <p>风向：${weatherData.winddirection}</p>
                    <p>风力：${weatherData.windpower}级</p>
                    <p>发布时间：${weatherData.reporttime}</p>
                `;
            } catch (error) {
                resultDiv.innerText = `请求失败：${error.message}`;
            } finally {
                setTimeout(function () {
                    querying = false;
                    weatherBtn.disabled = false;
                }, 1500);
            }
        });

        updateToggleArrow();
        loadProvinces();
    </script>
</body>
</html>
